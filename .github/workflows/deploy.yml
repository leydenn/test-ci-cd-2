name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/my-webapp

jobs:
  # ========== JOB 1: Тесты и линтеры ==========
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest app/test_main.py -v

  # ========== JOB 2: Сборка и пуш Docker образов ==========
  docker-build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_IMAGE }}-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_IMAGE }}-frontend:latest

  # ========== JOB 3: Деплой на сервер ==========
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Создаём папку если её нет
            mkdir -p /app/my-webapp
            cd /app/my-webapp
            
            # Скачиваем последние образы
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-webapp-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-webapp-frontend:latest
            
            # Останавливаем и удаляем старые контейнеры
            docker stop my-backend my-frontend my-db 2>/dev/null || true
            docker rm my-backend my-frontend my-db 2>/dev/null || true
            
            # Запускаем базу данных
            docker run -d --name my-db \
              -e POSTGRES_USER=user \
              -e POSTGRES_PASSWORD=password \
              -e POSTGRES_DB=mydb \
              -v pgdata:/var/lib/postgresql/data \
              --restart unless-stopped \
              postgres:15-alpine
            
            # Ждём, пока БД запустится
            sleep 5
            
            # Запускаем бэкенд
            docker run -d --name my-backend \
              -p 8000:8000 \
              -e DATABASE_URL=postgresql://user:password@my-db:5432/mydb \
              --link my-db \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/my-webapp-backend:latest
            
            # Запускаем фронтенд
            docker run -d --name my-frontend \
              -p 80:80 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/my-webapp-frontend:latest
            
            # Очищаем старые образы
            docker system prune -f